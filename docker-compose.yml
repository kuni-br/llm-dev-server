services:
  llama:
    build: .
    container_name: llama-dev
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command:
      - "-m"
      - "/models/Phi-3-mini-4k-instruct-q4.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--ctx-size"
      - "4096"
      - "--threads"
      - "8"
      - "--mlock"
      - "--parallel"
      - "1"